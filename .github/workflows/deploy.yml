name: Deploy Eleventy to Pages

on:
  push:
    branches: ["main"] # メインブランチにpushされたら実行（masterの場合は変更してください）

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20' # 使用するNode.jsのバージョン
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Eleventy
        run: npx @11ty/eleventy # 余計なパス指定なしでクリーンにビルド

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site' # 出力フォルダ名（eleventy.config.jsのoutputと一致させてください）

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
