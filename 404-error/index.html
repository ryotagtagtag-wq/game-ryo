    <style>
        :root {
            --primary: #0052cc;
            --primary-light: #0764f1;
            --dark: #0a192f;
            --dark-light: #172a45;
            --accent: #00bfff;
            --bg: #f8fafc;
            --text: #334155;
            --text-light: #94a3b8;
            --white: #ffffff;
            --glass: rgba(13, 29, 52, 0.9);
            --transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            --gradient-accent: linear-gradient(135deg, #00bfff, #0052cc);
            --gradient-orange: linear-gradient(135deg, #ff5000, #ff8c00);
        }
        
        * { box-sizing: border-box; outline: none; }
        html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
        
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            margin: 0; padding: 0;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        #scroll-progress {
            position: fixed; top: 0; left: 0; width: 0%; height: 4px;
            background: var(--gradient-accent);
            z-index: 1000001; transition: width 0.1s;
        }

        /* --- ナビゲーションバー --- */
        .navbar {
            position: fixed; top: 0; left: 0; width: 100%;
            background: var(--glass); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            display: flex; justify-content: space-between; align-items: center;
            padding: 1rem 2.5rem; z-index: 100000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .nav-logo { color: var(--white); font-weight: 800; font-size: 1.2rem; cursor: pointer; text-decoration: none; }
        
        .nav-right { display: flex; align-items: center; gap: 2rem; }
        .nav-links { display: flex; gap: 2rem; list-style: none; margin: 0; padding: 0; }
        .nav-links a { color: var(--white); text-decoration: none; font-weight: 600; font-size: 0.95rem; transition: var(--transition); opacity: 0.8; }
        .nav-links a:hover { color: var(--accent); opacity: 1; }

        /* 言語セレクター */
        .lang-selector {
            background: rgba(255, 255, 255, 0.1);
            color: var(--white);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 6px 12px;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }
        .lang-selector:hover { background: rgba(255, 255, 255, 0.2); }
        .lang-selector option { background: var(--dark); color: var(--white); }
        
        .menu-toggle { display: none; flex-direction: column; gap: 5px; background: none; border: none; cursor: pointer; padding: 5px; }
        .menu-toggle span { display: block; width: 22px; height: 2px; background: var(--white); border-radius: 2px; transition: var(--transition); }

        /* ヘッダーエリア（エラー演出用のサイバー背景） */
        header {
            background: radial-gradient(circle at top right, var(--dark-light), var(--dark));
            color: var(--white);
            padding: 12rem 1.5rem 8rem;
            text-align: center;
            position: relative;
            overflow: hidden;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* 404の巨大テキストアニメーション */
        .error-code {
            font-size: clamp(6rem, 20vw, 11rem);
            font-weight: 800;
            line-height: 1;
            margin: 0;
            background: linear-gradient(135deg, var(--white) 30%, var(--accent), var(--primary-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            position: relative;
            animation: float 6s ease-in-out infinite;
        }

        /* 装飾用SVGグラフィック */
        .error-illustration {
            width: 180px;
            height: 180px;
            margin-bottom: 2rem;
            opacity: 0.95;
            filter: drop-shadow(0px 8px 25px rgba(0, 191, 255, 0.45));
            animation: float-slow 8s ease-in-out infinite;
        }

        header h2 {
            margin: 1.5rem 0 0.5rem;
            font-size: clamp(1.8rem, 5vw, 2.8rem);
            font-weight: 800;
            color: var(--white);
            display: flex;
            align-items: center;
            gap: 0;
        }
        header h2::before { display: none; } /* ヘッダー内では既存のbeforeスタイルを無効化 */

        header p {
            font-size: 1.15rem; max-width: 600px; margin: 1rem auto 2.5rem;
            color: var(--text-light); opacity: 0.9;
            line-height: 1.7;
        }

        /* コンテンツコンテナ（カード型レイアウトの調整） */
        .container { max-width: 800px; margin: -4rem auto 6rem; padding: 0 1.5rem; position: relative; z-index: 10; width: 100%; }
        
        .card {
            background: var(--white); padding: 3rem; border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08); margin-bottom: 2.5rem;
            border: 1px solid rgba(226, 232, 240, 0.8); transition: var(--transition);
            text-align: center;
        }
        .card:hover { transform: translateY(-8px); border-color: var(--accent); }

        .btn-container {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            flex-wrap: wrap;
        }

        .primary-button {
            display: inline-flex; align-items: center; justify-content: center; gap: 12px;
            background: var(--gradient-accent); color: var(--white) !important; text-decoration: none;
            padding: 1.2rem 2.5rem; border-radius: 20px; font-weight: 700; font-size: 1.15rem;
            transition: var(--transition); box-shadow: 0 15px 35px rgba(0, 82, 204, 0.25);
        }
        .primary-button:hover { background: var(--primary-light); transform: translateY(-3px); box-shadow: 0 20px 40px rgba(0, 82, 204, 0.4); }

        .secondary-button {
            display: inline-flex; align-items: center; justify-content: center; gap: 12px;
            background: var(--white); color: var(--dark) !important; text-decoration: none;
            padding: 1.2rem 2.5rem; border-radius: 20px; font-weight: 700; font-size: 1.15rem;
            border: 2px solid var(--dark);
            transition: var(--transition);
        }
        .secondary-button:hover { background: rgba(10, 25, 47, 0.05); transform: translateY(-3px); }

        /* フッター */
        footer { background-color: var(--dark); color: var(--text-light); padding: 6rem 1.5rem 10rem; text-align: center; width: 100%; margin-top: auto; }
        .status-badge {
            display: inline-flex; align-items: center; gap: 8px; background-color: rgba(30, 41, 59, 0.8);
            color: var(--accent); padding: 0.7rem 1.5rem; border-radius: 100px; font-size: 0.9rem; font-weight: 600;
        }
        .status-dot { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 10px var(--accent); animation: pulse 2s infinite; }

        /* クッキーバナー */
        .ch-cookie-banner {
            position: fixed; bottom: 32px; left: 32px; right: 32px;
            background: var(--glass); backdrop-filter: blur(15px); color: var(--white);
            padding: 24px 32px; border-radius: 24px; z-index: 1000000;
            display: flex; justify-content: space-between; align-items: center; gap: 24px; flex-wrap: wrap;
        }
        .ch-cookie-banner.ch-hidden { display: none !important; }
        .ch-cookie-buttons { display: flex; gap: 14px; }
        .ch-cookie-btn { padding: 14px 28px; border: none; border-radius: 14px; font-weight: 700; cursor: pointer; }
        .ch-btn-accept { background: var(--primary); color: var(--white); }
        .ch-btn-deny { background: rgba(255, 255, 255, 0.1); color: var(--white); }

        /* チャットボタン */
        #special-mobile-chat-container { display: none; position: fixed; bottom: 32px; right: 32px; z-index: 99999; }
        #special-mobile-chat-btn {
            display: flex; align-items: center; gap: 10px; padding: 16px 28px;
            background: var(--gradient-orange); color: var(--white); border: none;
            font-size: 1.1rem; font-weight: 800; border-radius: 9999px; cursor: pointer;
        }
        #special-mobile-close-btn {
            position: absolute; top: -8px; left: -8px; width: 28px; height: 28px;
            background: var(--dark); color: var(--white); border-radius: 50%;
            display: flex; align-items: center; justify-content: center; border: 2px solid var(--white);
        }

        /* アニメーション */
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        @keyframes float-slow {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-12px) rotate(3deg); }
        }

        @media (max-width: 900px) {
            .nav-right { gap: 1rem; }
            .nav-links { display: none; }
            .nav-links.active {
                display: flex; position: absolute; top: 100%; left: 0; width: 100%;
                background: var(--dark); flex-direction: column; padding: 2rem 0;
            }
            .menu-toggle { display: flex; }
            .btn-container { flex-direction: column; gap: 1rem; }
            .primary-button, .secondary-button { width: 100%; }
        }
    </style>
</head>
<body>

    <div id="scroll-progress"></div>

    <nav class="navbar">
        <a href="/" class="nav-logo">game_ryo</a>

    <header>
        <!-- 404イラスト：近未来的なサイバーホログラムを表現するSVG -->
        <svg class="error-illustration" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- 外側の点線サイバーサークル -->
            <circle cx="100" cy="100" r="85" stroke="url(#paint0_linear)" stroke-width="2.5" stroke-dasharray="8 12" />
            <!-- 内側の回転リング -->
            <circle cx="100" cy="100" r="65" stroke="#00bfff" stroke-width="1.5" stroke-dasharray="50 15 90 25" opacity="0.6"/>
            <!-- ネットワーク接続ノード（切断されたリンクを表現） -->
            <circle cx="60" cy="80" r="5" fill="#00bfff" />
            <circle cx="140" cy="80" r="5" fill="#00bfff" />
            <circle cx="100" cy="145" r="5" fill="#0052cc" />
            <!-- 点線によるリンク -->
            <path d="M60 80 L100 100" stroke="#00bfff" stroke-width="2" stroke-dasharray="4 4" opacity="0.5"/>
            <path d="M140 80 L100 100" stroke="#00bfff" stroke-width="2" stroke-dasharray="4 4" opacity="0.5"/>
            <path d="M100 145 L100 100" stroke="#0052cc" stroke-width="2" stroke-dasharray="4 4" opacity="0.5"/>
            <!-- 中央の3Dホログラム・キューブ -->
            <path d="M100 65 L130 82 L130 118 L100 135 L70 118 L70 82 Z" stroke="url(#paint0_linear)" stroke-width="3" fill="rgba(0, 191, 255, 0.08)" />
            <path d="M100 65 L100 135" stroke="url(#paint0_linear)" stroke-width="1.5" opacity="0.7" />
            <path d="M70 82 L100 100 L130 82" stroke="url(#paint0_linear)" stroke-width="1.5" opacity="0.7" />
            <!-- 中央のホワイト警告インジケーター -->
            <path d="M100 85 V105" stroke="#ffffff" stroke-width="4.5" stroke-linecap="round" />
            <circle cx="100" cy="116" r="3" fill="#ffffff" />
            <defs>
                <linearGradient id="paint0_linear" x1="20" y1="20" x2="180" y2="180" gradientUnits="userSpaceOnUse">
                    <stop stop-color="#00bfff"/>
                    <stop offset="1" stop-color="#0052cc"/>
                </linearGradient>
            </defs>
        </svg>

        <div class="error-code">404</div>
        <h2 data-t="error_title">ページが見つかりません</h2>
        <p data-t="error_desc">お探しのページは、移動または削除されたか、最初から存在しない可能性があります。</p>
    </header>

    <div class="container" id="contentContainer">
        <section class="card">
            <div class="btn-container">
                <a href="/" class="primary-button">
                    <span data-t="btn_home">トップページへ戻る</span>
                </a>

    <footer>
        <p>&copy; 2026 game_ryo. All Rights Reserved.</p>
        <div class="status-badge">
            <span class="status-dot"></span>
            <span data-t="status_text">Status: Under application for Open Source Collective (Covina, CA, USA)</span>
        </div>
    </footer>

  
</body>
</html>
